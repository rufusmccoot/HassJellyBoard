title: 1-TV Kids
path: tvshowskids
type: sidebar
icon: steve:media-icon-tvshowskids
cards:
  - type: vertical-stack
    cards:
      - type: custom:button-card
        color_type: label-card
        template: section-header
        name: 1-TV Kids
      - type: grid
        square: true
        columns: 5
        cards:
          - show_name: true
            show_icon: true
            type: button
            icon: mdi:remote-tv
            name: TV Remote
            tap_action:
              action: navigate
              navigation_path: /dashboard-media/remote
          - type: custom:button-card
            variables:
              this_media: "Aaahh!!! Real Monsters"
              media_id: 01aa2f003d063e3b24887fafad8f5c35
              media_type: tvshows
            name: '[[[ return variables.this_media; ]]]'
            confirmation:
              text: >-
                [[[ return "Do you want to play \x22" + variables.this_media + "\x22?";
                ]]]
            aspect_ratio: 1/1.5
            size: 150
            styles:
            card:
              - height: 100px
              - --mdc-ripple-color: blue
              - --mdc-ripple-press-opacity: '0.5'
            entity_picture: 
              https://jelly.spaghettifiesta.com/Items/01aa2f003d063e3b24887fafad8f5c35/Images/Primary?api_key=987bbb6b2f064f7d8149f25fe67b9ac3
            show_entity_picture: true
            show_name: true
            show_icon: false
            tap_action:
              action: call-service
              service: script.jellyfin_play_tv_based_libraries
              service_data:
                media_id: '[[[ return variables.media_id; ]]]'
                media_type: '[[[ return variables.media_type; ]]]'
