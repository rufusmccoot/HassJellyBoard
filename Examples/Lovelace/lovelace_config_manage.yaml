# This management view is mantained manually, not via the Python.
# We edit this YAML directly to make changes.


title: Manage
path: manage
icon: mdi:cog
#type: sidebar
cards:
- type: vertical-stack
  cards:
  - type: custom:button-card
    color_type: label-card
    template: section-header
    name: Rebuild Jellyboard YAMLs
  - type: grid
    square: false
    columns: 3
    cards:
      - type: custom:button-card
        styles:
          card:
            - --mdc-ripple-color: >
                [[[
                return 'var(--text-primary-color)';
                ]]]
            - --mdc-ripple-press-opacity: 0.5
          icon:
            - height: 40px
          label:
            - color: white
            - font-size: 11px
            - padding: 0px 5px
        name: "All Libraries"
        show_name: true
        show_icon: true
        icon: mdi:infinity
        tap_action:
          action: call-service
          service: rest_command.rebuild_jellyboard_yaml_all
      - type: custom:button-card
        styles:
          card:
            - --mdc-ripple-color: >
                [[[
                return 'var(--text-primary-color)';
                ]]]
            - --mdc-ripple-press-opacity: 0.5
          icon:
            - height: 40px
          label:
            - color: white
            - font-size: 11px
            - padding: 0px 5px
        name: "TV"
        show_name: true
        show_icon: true
