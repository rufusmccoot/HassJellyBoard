- type: vertical-stack
  cards: 
    - type: custom:button-card
      color_type: label-card
      template: section-header
      name: Control
    - type: custom:button-card
      name: Reboot TV
      confirmation:
        text: Are you sure you want to reboot the TV?
      size: 40px
      entity: switch.wifi_plug_tv_socket_1
      card:
        - height: 100px
        - '--mdc-ripple-color': blue
        - '--mdc-ripple-press-opacity': 0.5
      show_name: true
      show_icon: true
      show_label: true
      label: >
        [[[
          return 'TV Outlet: ' + states['switch.wifi_plug_tv_socket_1'].state;
        ]]]
      tap_action:
        action: call-service
        service: script.reboot_living_room_tv
        target: {}
      styles:
        label:
          - font-size: 11px
          - color: gray
- type: vertical-stack
  cards: 
  - type: custom:button-card
    color_type: label-card
    template: section-header
    name: Media Players
  - type: conditional
    conditions:
      - entity: media_player.living_room_tv_jelly
        state_not: 'off'
      - entity: media_player.living_room_tv_jelly
        state_not: idle
      - entity: media_player.living_room_tv_jelly
        state_not: unavailable
    card:
      type: media-control
      entity: media_player.living_room_tv_jelly